<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM Sans:wght@500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Ranchers:wght@400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Righteous:wght@400&display=swap"
    />
  </head>
  <body>
    <div class="chat-bot">
      <header class="container">
        <div class="container2">
          <img class="asset-5-1" alt="" src="./public/Asset-5-1@2x.png" />

          <img
            class="asset-4-1"
            loading="lazy"
            alt=""
            src="./public/Asset-4-1@2x.png"
          />

          <div class="heading-1"></div>
        </div>
        <div class="container-wrapper">
          <nav class="container3">
            <div class="button">
              <div class="home">Home</div>
            </div>
            <div class="button2">
              <div class="simulation">Simulation</div>
            </div>
            <div class="button3">
              <div class="patients">Patients</div>
            </div>
            <div class="button4">
              <div class="progress">Progress</div>
            </div>
          </nav>
        </div>
        <button class="container4">
          <div class="dr">DR</div>
        </button>
      </header>
      <main class="frame-parent">
        <section class="frame-group">
          <div class="tests-wrapper">
            <h3 class="tests">Tests</h3>
          </div>
          <div class="urine-parent">
            <h1 class="urine">Urine</h1>
            <div class="test1-100">Test1 100</div>
            <div class="test2-200">Test2 200</div>
          </div>
          <div class="blood-parent">
            <h2 class="urine">Blood</h2>
            <div class="test1-100">Test1 100</div>
            <div class="test2-200">Test2 200</div>
          </div>
          <div class="action-buttons-parent">
            <button class="action-buttons">
              <div class="see-images">See Images</div>
            </button>
            <button class="action-buttons">
              <div class="see-images">Make Tests</div>
            </button>
          </div>
        </section>
        <section class="frame-container">
          <div class="frame-div">
            <div class="john-michiell-wrapper">
              <h3 class="john-michiell">John Michiell</h3>
            </div>
            <div class="cardiology-wrapper">
              <div class="cardiology">Cardiology</div>
            </div>
          </div>
          <div class="frame-parent2">
            <div class="frame-wrapper">
              <div class="doctor-iam-having-chest-pain-wrapper">
                <div class="doctor-iam-having">
                  Doctor, Iam having chest pain.
                </div>
              </div>
            </div>
            <div class="frame-parent3">
              <div class="frame-wrapper2">
                <div class="what-other-symptoms-you-have-wrapper">
                  <div class="doctor-iam-having">
                    What other symptoms you have?
                  </div>
                </div>
              </div>
              <div class="polygon-parent">
                <img
                  class="frame-child"
                  loading="lazy"
                  alt=""
                  src="./public/Polygon-1.svg"
                />

                <div class="frame-item"></div>
                <img
                  class="frame-child"
                  loading="lazy"
                  alt=""
                  src="./public/Polygon-1.svg"
                />
              </div>
            </div>
          </div>
        </section>
        <section class="patient-data-summary-parent">
          <div class="patient-data-summary">
            <div class="summary-descriptors">
              <div class="years">54 Years ♂</div>
            </div>
            <div class="summary-descriptors2">
              <div class="doctor-iam-having">Stable State</div>
            </div>
            <div class="nervous-irritable-defensive">
              Nervous, Irritable, Defensive, Stubborn
            </div>
          </div>
          <div class="frame-parent4">
            <button class="hints-wrapper">
              <div class="see-images">Hints</div>
            </button>
            <button class="abort-case-wrapper">
              <div class="abort-case">Abort case</div>
            </button>
          </div>
        </section>
        <div class="frame-wrapper3">
          <button class="make-diagnosis-wrapper" type="submit">
            <div class="make-diagnosis">Make Diagnosis</div>
          </button>
        </div>
      </main>
      <div class="frame-parent5">
        <input
          class="frame-input"
          placeholder="Write your question here..."
          type="text"
        />

        <button class="button5">
          <img class="icon" alt="" src="./public/Icon2.svg" />
        </button>
      </div>
    </div>
  </body>
</html>
