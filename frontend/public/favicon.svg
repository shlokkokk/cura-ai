<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Circuit board pins - top -->
  <line x1="20" y1="2" x2="20" y2="10" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="2" x2="32" y2="10" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="2" x2="44" y2="10" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Circuit board pins - bottom -->
  <line x1="20" y1="54" x2="20" y2="62" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="54" x2="32" y2="62" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="54" x2="44" y2="62" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
