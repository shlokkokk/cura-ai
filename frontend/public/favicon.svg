  <line x1="2" y1="20" x2="10" y2="20" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="2" y1="32" x2="10" y2="32" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="2" y1="44" x2="10" y2="44" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Circuit board pins - right -->
  <line x1="54" y1="20" x2="62" y2="20" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="54" y1="32" x2="62" y2="32" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="54" y1="44" x2="62" y2="44" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Corner diagonal pins -->
  <line x1="4" y1="4" x2="12" y2="12" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="4" x2="52" y2="12" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
