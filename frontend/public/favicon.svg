  <rect x="10" y="10" width="44" height="44" rx="8" stroke="#5B21B6" stroke-width="3" fill="none"/>
  <!-- Heart shape -->
  <path d="M32 44C32 44 20 36 20 28C20 24 23 22 26 22C28.5 22 30.5 23.5 32 25.5C33.5 23.5 35.5 22 38 22C41 22 44 24 44 28C44 36 32 44 32 44Z" stroke="#5B21B6" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
