  <line x1="32" y1="29" x2="32" y2="37" stroke="#5B21B6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="33" x2="36" y2="33" stroke="#5B21B6" stroke-width="2.5" stroke-linecap="round"/>
